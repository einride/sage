# Generated by go.einride.tech/sage. DO NOT EDIT.

name: {{ .Name }}

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
{{- range .Jobs }}
  {{ .Name }}:
    runs-on: {{ .RunsOn }}
{{- with .Needs }}
    needs:
{{- range . }}
      - {{ . }}
{{- end }}
{{- end }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Sage
        uses: {{ .SetupAction }}
{{- with .SetupWith }}
        with:
{{- range . }}
          {{ .Key }}: {{ .Value }}
{{- end }}
{{- end }}

      - name: make {{ .Target }}
        run: make {{ .Target }}
{{ end }}
